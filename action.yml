name: Deploy Staging CDK with NPM
description: 'Deploys CDK with NPM with a post action to destroy the stack'
inputs:
  cdk-command:
    description: 'The command to run to deploy the stack'
    required: false
    default: 'deploy:staging'
  cdk-post-command:
    description: 'The command to run to destroy the stack'
    required: false
    default: 'destroy:staging'
  working-directory:
    description: 'The working directory to run the command in'
    required: false
    default: '.'
  destroy-stack-on-completion:
    description: 'A flag to control if the staging stack is destroyed after the workflow completes'
    required: false
    default: 'true'

runs:
  using: 'node20'
  main: 'deploy.js'
  post: 'destroy.js'


